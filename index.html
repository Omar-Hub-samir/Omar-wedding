
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omar & Doaa</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Cairo',sans-serif;
background:#120904;
overflow-x:hidden;
color:white;
}

/* Intro */

#intro{
position:fixed;
inset:0;
background:linear-gradient(180deg,#f2e7d8,#e8dbc9);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
overflow:hidden;
}

#intro::before{
content:'';
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle, rgba(212,161,95,.18) 2px, transparent 2px);
background-size:60px 60px;
animation:moveBg 20s linear infinite;
}

@keyframes moveBg{
from{transform:translate(0,0)}
to{transform:translate(-120px,-120px)}
}

.envelope{
width:340px;
height:230px;
position:relative;
cursor:pointer;
z-index:2;
perspective:1000px;
}

.side{
position:absolute;
top:0;
width:50%;
height:100%;
background:#d6ab70;
transition:1.2s;
}

.left{
left:0;
clip-path:polygon(0 0,100% 50%,0 100%);
transform-origin:left;
}

.right{
right:0;
clip-path:polygon(100% 0,0 50%,100% 100%);
transform-origin:right;
}

.card{
position:absolute;
inset:15px;
background:#fff8ef;
border-radius:14px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.card h1{
font-size:42px;
color:#9a7153;
}

.card p{
font-size:24px;
color:#9a7153;
margin-top:10px;
}

.open .left{
transform:rotateY(-160deg);
}

.open .right{
transform:rotateY(160deg);
}

.tap{
margin-top:35px;
font-size:26px;
color:#8d674b;
z-index:2;
}

/* Main */

#main{
display:none;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.hero{
min-height:100vh;
background:url('assets/cover.png') center/cover no-repeat;
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

.hero::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.3);
}

.scroll{
position:absolute;
bottom:30px;
font-size:18px;
color:#f2d19d;
animation:bounce 2s infinite;
z-index:2;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.count-section{
min-height:100vh;
background:
linear-gradient(rgba(10,5,2,.92),rgba(10,5,2,.92)),
url('assets/cover.png') center/cover;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
position:relative;
overflow:hidden;
}

.count-section::before,
.count-section::after{
content:'✦';
position:absolute;
font-size:24px;
color:#d6ab70;
animation:float 6s infinite ease-in-out;
opacity:.6;
}

.count-section::before{
top:20%;
left:10%;
}

.count-section::after{
bottom:15%;
right:12%;
animation-delay:2s;
}

@keyframes float{
50%{transform:translateY(-15px)}
}

.count-box{
text-align:center;
max-width:900px;
}

.count-box h2{
font-size:60px;
color:#f3d39e;
margin-bottom:20px;
}

.count-box p{
font-size:24px;
margin-bottom:40px;
color:#e9d4b3;
}

.timer{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.unit{
background:rgba(255,255,255,.08);
border:1px solid #d6ab70;
padding:25px;
border-radius:24px;
min-width:120px;
backdrop-filter:blur(8px);
}

.unit span{
display:block;
font-size:48px;
font-weight:bold;
color:#f3d39e;
}

.unit small{
font-size:18px;
color:#f7e4c4;
}

.location{
min-height:100vh;
background:#efe3d3;
padding:70px 20px;
display:flex;
justify-content:center;
align-items:center;
}

.location-card{
background:#f7efe5;
max-width:850px;
width:100%;
padding:40px;
border-radius:35px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.12);
border:2px solid #d6ab70;
}

.location-card h2{
font-size:48px;
color:#8d674b;
margin-bottom:25px;
}

.location-card p{
font-size:26px;
color:#8d674b;
margin-bottom:15px;
}

.qr{
width:180px;
margin:30px auto;
display:block;
border-radius:20px;
}

.btn{
display:inline-block;
padding:16px 40px;
background:#c89b60;
color:white;
text-decoration:none;
border-radius:50px;
font-size:22px;
margin-top:20px;
}

.music-btn{
position:fixed;
top:20px;
left:20px;
z-index:999;
border:none;
background:white;
padding:14px 22px;
border-radius:50px;
font-size:18px;
cursor:pointer;
}

@media(max-width:768px){

.card h1{
font-size:34px;
}

.count-box h2{
font-size:42px;
}

.unit{
min-width:90px;
padding:20px;
}

.unit span{
font-size:38px;
}

.location-card h2{
font-size:38px;
}

.location-card p{
font-size:22px;
}

}

</style>
</head>

<body>

<div id="intro">

<div class="envelope" id="envelope">

<div class="side left"></div>
<div class="side right"></div>

<div class="card">
<h1>Omar & Doaa</h1>
<p>Tap To Open</p>
</div>

</div>

<div class="tap">
Wedding Invitation
</div>

</div>

<div id="main">

<button class="music-btn" onclick="toggleMusic()">🎵 Music</button>

<section class="hero">
<div class="scroll">Scroll Down ✨</div>
</section>

<section class="count-section">

<div class="count-box">

<h2>Omar & Doaa</h2>

<p>
We Can't Wait To Celebrate With You
</p>

<div class="timer">

<div class="unit">
<span id="days">0</span>
<small>Days</small>
</div>

<div class="unit">
<span id="hours">0</span>
<small>Hours</small>
</div>

<div class="unit">
<span id="minutes">0</span>
<small>Minutes</small>
</div>

<div class="unit">
<span id="seconds">0</span>
<small>Seconds</small>
</div>

</div>

</div>

</section>

<section class="location">

<div class="location-card">

<h2>Diamond Hall</h2>

<p>
Friday · October 16, 2026
</p>

<p>
9:00 PM
</p>

<img class="qr" src="assets/qr.png">

<a class="btn"
target="_blank"
href="https://maps.app.goo.gl/RPXMxUht4xTKCKT37?g_st=ic">

Open Location

</a>

</div>

</section>

</div>

<audio id="music" loop>
<source src="assets/music.mp3" type="audio/mpeg">
</audio>

<script>

const envelope=document.getElementById('envelope');
const intro=document.getElementById('intro');
const main=document.getElementById('main');
const music=document.getElementById('music');

envelope.onclick=()=>{

envelope.classList.add('open');

music.play().catch(()=>{});

setTimeout(()=>{
intro.style.display='none';
main.style.display='block';
},1200);

}

function toggleMusic(){

if(music.paused){
music.play();
}else{
music.pause();
}

}

const targetDate = new Date("2026-10-16T21:00:00").getTime();

setInterval(()=>{

const now = new Date().getTime();
const distance = targetDate - now;

document.getElementById("days").innerHTML =
Math.floor(distance / (1000*60*60*24));

document.getElementById("hours").innerHTML =
Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

document.getElementById("minutes").innerHTML =
Math.floor((distance % (1000*60*60)) / (1000*60));

document.getElementById("seconds").innerHTML =
Math.floor((distance % (1000*60)) / 1000);

},1000);

</script>

</body>
</html>
